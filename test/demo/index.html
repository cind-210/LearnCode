<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D 函数图像绘制</title>
    <link rel="stylesheet" href="style.css">
    <!-- KaTeX for formula rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <!-- math.js for expression evaluation -->
    <script src="https://cdn.jsdelivr.net/npm/mathjs@12.4.1/lib/browser/math.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 左侧面板 -->
        <div class="panel">
            <h1>📐 2D 函数图像绘制</h1>
            <p class="subtitle">输入函数方程，在右侧画布上绘制图像</p>

            <!-- 函数列表 -->
            <div class="function-list" id="functionList">
                <!-- 动态添加的函数条目 -->
            </div>

            <!-- 添加函数按钮 -->
            <button class="btn-add" id="btnAdd">+ 添加函数</button>

            <!-- 视图设置 -->
            <div class="settings">
                <h3>视图范围</h3>
                <div class="settings-row">
                    <label>X 最小值</label>
                    <input type="number" id="xMin" value="-10" step="0.5">
                </div>
                <div class="settings-row">
                    <label>X 最大值</label>
                    <input type="number" id="xMax" value="10" step="0.5">
                </div>
                <div class="settings-row">
                    <label>Y 最小值</label>
                    <input type="number" id="yMin" value="-10" step="0.5">
                </div>
                <div class="settings-row">
                    <label>Y 最大值</label>
                    <input type="number" id="yMax" value="10" step="0.5">
                </div>
                <button class="btn-primary" id="btnUpdateView">更新视图</button>
            </div>
        </div>

        <!-- 右侧画布 -->
        <div class="canvas-wrapper">
            <canvas id="graphCanvas"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
