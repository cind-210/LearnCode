<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnCode</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e0e0e0;
    }

    .header h1 {
      font-size: 18px;
      color: #e94560;
    }

    .workspace-label {
      color: #777;
      font-size: 12px;
      max-width: 60vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .header-actions button {
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ddd;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .header-actions button:hover {
      background: #e8e8e8;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      width: 220px;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .sidebar h3 {
      font-size: 13px;
      color: #999;
      margin-bottom: 8px;
    }

    .sidebar .new-btn {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .sidebar .new-btn:hover {
      background: #d03050;
    }

    .session-item {
      padding: 8px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 4px;
      color: #555;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }

    .session-item:hover {
      background: #f0f0f0;
    }

    .session-item.active {
      background: #e94560;
      color: #fff;
    }

    .session-item .title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-item .naming-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(153, 153, 153, 0.35);
      border-top-color: #999;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    .session-item.active .naming-spinner {
      border-color: rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
    }

    .session-item .actions {
      display: none;
      gap: 2px;
      flex-shrink: 0;
    }

    .session-item:hover .actions {
      display: flex;
    }

    .session-item .actions button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      padding: 2px 4px;
      border-radius: 2px;
      color: #999;
    }

    .session-item.active .actions button {
      color: rgba(255, 255, 255, 0.7);
    }

    .session-item .actions button:hover {
      background: rgba(0, 0, 0, 0.1);
      color: #333;
    }

    .session-item.active .actions button:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .session-item.child {
      margin-left: 18px;
    }

    .session-item.child .title {
      padding-left: 4px;
    }

    .session-toggle {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      color: #999;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .session-toggle .chevron {
      width: 18px;
      height: 18px;
      transform-origin: 50% 50%;
      transition: transform 0.12s ease;
    }

    .session-toggle.expanded .chevron {
      transform: rotate(90deg);
    }

    .session-toggle .chevron polyline {
      fill: none;
      stroke: currentColor;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .session-item.active .session-toggle {
      color: rgba(255, 255, 255, 0.85);
    }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(245, 245, 245, 0.72);
      z-index: 5;
      pointer-events: none;
    }

    .loading-overlay.hidden {
      display: none;
    }

    .loading-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      color: #666;
      font-size: 13px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .loading-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(233, 69, 96, 0.25);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    .todo-panel {
      display: none;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 20px;
    }

    .todo-panel.visible {
      display: flex;
      flex-direction: column;
      max-height: min(180px, 24vh);
    }

    .todo-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #666;
      font-weight: 600;
    }

    .todo-panel-count {
      color: #999;
      font-weight: 400;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
      overflow-y: auto;
      padding-right: 4px;
    }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13px;
      color: #555;
      line-height: 1.35;
    }

    .todo-text {
      overflow-wrap: anywhere;
    }

    .todo-icon {
      width: 16px;
      color: #999;
      flex-shrink: 0;
      text-align: center;
    }

    .todo-item.in_progress .todo-icon {
      color: #e94560;
    }

    .todo-item.in_progress .todo-text {
      color: #333;
      font-weight: 600;
    }

    .todo-item.completed .todo-text {
      color: #999;
      text-decoration: line-through;
    }

    .message {
      margin-bottom: 16px;
      display: flex;
      gap: 10px;
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .message .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      color: #fff;
    }

    .message.assistant .avatar {
      background: #e94560;
    }

    .message.user .avatar {
      background: #667eea;
    }

    .message .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }

    .message.assistant .bubble {
      background: #fff;
      border: 1px solid #e8e8e8;
      color: #333;
    }

    .message.user .bubble {
      background: #667eea;
      color: #fff;
    }

    .message.tool .bubble {
      background: #fafafa;
      border: 1px solid #e0e0e0;
      font-size: 12px;
      color: #888;
    }

    .message.loop .bubble {
      background: #fafafa;
      border: 1px solid #e0e0e0;
      color: #666;
      font-size: 12px;
      padding: 0;
      overflow: hidden;
    }

    .loop-container-header {
      cursor: pointer;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      user-select: none;
    }

    .loop-container-title {
      font-weight: 600;
      color: #555;
    }

    .loop-container-count {
      color: #999;
      font-size: 11px;
    }

    .loop-container-body {
      border-top: 1px solid #e8e8e8;
      padding: 8px 12px;
      max-height: 360px;
      overflow-y: auto;
    }

    .loop-container.collapsed .loop-container-body {
      display: none;
    }

    .loop-event {
      border: 1px solid #e4e4e4;
      border-radius: 6px;
      background: #fff;
      overflow: hidden;
    }

    .loop-event + .loop-event {
      margin-top: 8px;
    }

    .loop-event-label {
      padding: 6px 8px;
      border-bottom: 1px solid #eeeeee;
      font-weight: 600;
      color: #555;
      background: #f7f7f7;
    }

    .loop-event.has-result .loop-event-label {
      cursor: pointer;
      user-select: none;
    }

    .loop-event:not(.result-visible) .loop-event-result {
      display: none;
    }

    .loop-event.assistant .loop-event-label {
      color: #b02a45;
    }

    .loop-event.tool .loop-event-label {
      color: #7a5b00;
    }

    .loop-event-body {
      padding: 8px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: #555;
    }

    .loop-event-result {
      margin: 0 8px 8px 22px;
      padding: 8px;
      border-left: 3px solid #ead7b8;
      background: #fffdf8;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: #555;
    }

    .message.error .bubble {
      background: #fff5f5;
      border: 1px solid #fcc;
      color: #c33;
    }

    .message.compact .bubble {
      background: #f5faf5;
      border: 1px solid #c8e6c9;
      font-size: 12px;
      color: #2e7d32;
    }

    .permission-card {
      max-width: 760px;
    }

    .permission-title {
      font-weight: 700;
      color: #7a3f00;
      margin-bottom: 6px;
    }

    .permission-meta {
      font-size: 12px;
      color: #777;
      margin-bottom: 8px;
    }

    .permission-input {
      max-height: 180px;
      overflow-y: auto;
      padding: 8px;
      border: 1px solid #ead7b8;
      background: #fffdf8;
      border-radius: 6px;
      font-size: 12px;
      color: #555;
      margin-bottom: 10px;
    }

    .permission-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .permission-actions button {
      border: 1px solid #d0d0d0;
      background: #fff;
      color: #444;
      border-radius: 4px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
    }

    .permission-actions button:hover {
      border-color: #e94560;
      color: #e94560;
    }

    .permission-card.resolved .permission-actions button {
      cursor: default;
      opacity: 0.5;
      pointer-events: none;
    }

    .input-area {
      padding: 16px 20px;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
    }

    .input-area textarea {
      flex: 1;
      background: #f5f5f5;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      font-family: inherit;
      min-height: 44px;
      max-height: 150px;
      outline: none;
    }

    .input-area textarea:focus {
      border-color: #e94560;
    }

    .input-area button {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .input-area button:hover {
      background: #d03050;
    }

    .input-area button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .status {
      padding: 6px 20px;
      font-size: 12px;
      color: #999;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #fafafa;
      border-top: 1px solid #eee;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.connected {
      background: #4caf50;
    }

    .dot.disconnected {
      background: #ccc;
    }

    .dot.processing {
      background: #ff9800;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .rename-input {
      border: 1px solid #e94560;
      border-radius: 2px;
      padding: 2px 4px;
      font-size: 13px;
      width: 100%;
      outline: none;
      font-family: inherit;
    }
  </style>
</head>

<body>
  <div class="header">
    <div>
      <h1>LearnCode</h1>
      <div class="workspace-label" id="workspace-label">Workspace: loading...</div>
    </div>
    <div class="header-actions">
      <button onclick="compactSession()">Compact</button>
    </div>
  </div>
  <div class="main">
    <div class="sidebar">
      <button class="new-btn" onclick="newSession()">+ New Session</button>
      <h3>Sessions</h3>
      <div id="session-list"></div>
    </div>
    <div class="chat-area">
      <div class="todo-panel" id="todo-panel">
        <div class="todo-panel-header">
          <span>Todo</span>
          <span class="todo-panel-count" id="todo-count"></span>
        </div>
        <div class="todo-list" id="todo-list"></div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="loading-overlay" id="loading-overlay">
        <div class="loading-card">
          <span class="loading-spinner"></span>
          <span>Connecting...</span>
        </div>
      </div>
      <div class="status" id="status">
        <span class="dot disconnected"></span><span id="status-text">Disconnected</span>
      </div>
      <div class="input-area">
        <textarea id="user-input" placeholder="Type a message..." rows="1" onkeydown="onKeyDown(event)"></textarea>
        <button id="send-btn" onclick="onSendButtonClick()">Send</button>
      </div>
    </div>
  </div>
  <script>
    let ws = null;
    let sessionId = null;
    let processing = false;
    let readOnlySession = false;
    let viewSessionId = null;
    let viewParentSessionId = null;
    let editingId = null;
    let currentLoopContainer = null;
    let currentStreamEvent = null;
    let streamedThinkingThisStep = false;
    let streamedTextThisStep = false;
    let currentTodos = [];
    const currentLoopToolEvents = new Map();
    const pendingPermissionCards = new Map();
    const pendingPermissionRules = new Map();
    const namingSessions = new Set();
    const expandedSessions = new Set();
    const subsessionsByParent = new Map();
    let lastSessions = [];

    function connect() {
      setLoading(true);
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}/ws`);
      updateSendButton();
      ws.onopen = () => {
        setLoading(false);
        setStatus('connected', 'Connected');
        listSessions();
        updateSendButton();
      };
      ws.onclose = () => {
        processing = false;
        setLoading(true);
        setStatus('disconnected', 'Disconnected - reconnecting...');
        updateSendButton();
        setTimeout(connect, 2000);
      };
      ws.onerror = () => {
        processing = false;
        setLoading(true);
        setStatus('disconnected', 'Connection error');
        updateSendButton();
      };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        handleEvent(msg.type, msg.data);
      };
    }

    function setStatus(cls, text) {
      document.getElementById('status').innerHTML = '<span class="dot ' + cls + '"></span><span id="status-text">' + text + '</span>';
    }

    function setLoading(loading) {
      const overlay = document.getElementById('loading-overlay');
      if (!overlay) return;
      overlay.classList.toggle('hidden', !loading);
    }

    function handleEvent(type, data) {
      switch (type) {
        case 'step':
          if (!streamedThinkingThisStep && data.thinking_blocks && data.thinking_blocks.length) {
            appendLoopEvent('Thinking', formatThinkingBlocks(data.thinking_blocks), 'thinking');
          }
          if (data.type === 'tool_calls') {
            if (!streamedTextThisStep && data.content) {
              appendLoopEvent('Assistant', data.content, 'assistant');
            }
            if (data.calls) {
              for (const c of data.calls) {
                if (c.tool_name !== 'TodoWrite') {
                  appendToolCallEvent(c.id, c.tool_name, c.input);
                }
              }
            }
          } else if (data.type === 'assistant' && data.kind === 'progress') {
            if (!streamedTextThisStep && data.content) {
              appendLoopEvent('Assistant', data.content, 'assistant');
            }
          } else if (data.type === 'assistant' && data.content) {
            if (streamedTextThisStep) {
              removeCurrentAssistantStreamEvent();
            }
            collapseLoopContainer();
            addMessage('assistant', data.content);
          }
          currentStreamEvent = null;
          resetStreamRenderState();
          break;
        case 'delta':
          handleDelta(data);
          break;
        case 'tool_result':
          attachToolResult(data.tool_use_id, (data.is_error ? '[Error] ' : '') + (data.content || ''));
          break;
        case 'done':
          processing = false;
          currentStreamEvent = null;
          resetStreamRenderState();
          pendingPermissionCards.clear();
          pendingPermissionRules.clear();
          collapseLoopContainer();
          updateSendButton();
          if (data.session_id) {
            sessionId = data.session_id;
            listSessions();
          }
          setStatus('connected', 'Ready');
          break;
        case 'stopped':
          processing = false;
          currentStreamEvent = null;
          resetStreamRenderState();
          pendingPermissionCards.clear();
          pendingPermissionRules.clear();
          collapseLoopContainer();
          updateSendButton();
          if (data && data.session_id) {
            sessionId = data.session_id;
            listSessions();
          }
          setStatus('connected', 'Stopped');
          break;
        case 'error':
          addMessage('error', formatError(data));
          processing = false;
          currentStreamEvent = null;
          resetStreamRenderState();
          pendingPermissionCards.clear();
          pendingPermissionRules.clear();
          collapseLoopContainer();
          updateSendButton();
          setStatus('connected', 'Error');
          break;
        case 'sessions':
          renderSessions(data);
          break;
        case 'subsessions':
          if (data && data.parent_session_id) {
            subsessionsByParent.set(data.parent_session_id, data.children || []);
            renderSessions(lastSessions);
          }
          break;
        case 'todos_updated':
          if (!data || !data.session_id || data.session_id === sessionId) {
            renderTodos((data && data.todos) || []);
          }
          break;
        case 'mcp_servers':
          renderMcpServers(data || []);
          break;
        case 'permission_request':
          renderPermissionRequest(data);
          break;
        case 'workspace':
          document.getElementById('workspace-label').textContent = 'Workspace: ' + data.workspace;
          break;
        case 'session_loaded':
          readOnlySession = !!data.read_only;
          viewSessionId = data.id;
          viewParentSessionId = data.parent_session_id || null;
          document.getElementById('messages').innerHTML = '';
          currentLoopContainer = null;
          currentStreamEvent = null;
          resetStreamRenderState();
          currentLoopToolEvents.clear();
          pendingPermissionCards.clear();
          pendingPermissionRules.clear();
          renderTodos(data.todos || []);
          if (data.messages) {
            for (const m of data.messages) {
              if (m.role === 'user') {
                addMessage('user', m.content);
              } else if (m.role === 'assistant') {
                if (m.content) addMessage('assistant', m.content);
              } else if (m.role === 'assistant_final') {
                collapseLoopContainer();
                if (m.content) addMessage('assistant', m.content);
              } else if (m.role === 'assistant_progress') {
                if (m.content) appendLoopEvent('Assistant', m.content, 'assistant');
              } else if (m.role === 'assistant_tool_call') {
                if (m.tool_name !== 'TodoWrite') {
                  appendToolCallEvent(m.tool_use_id, m.tool_name || '', m.input || {});
                }
              } else if (m.role === 'tool_result') {
                if (m.tool_name !== 'TodoWrite') {
                  attachToolResult(m.tool_use_id, (m.is_error ? '[Error] ' : '') + (m.content || ''));
                }
              } else if (m.role === 'assistant_thinking') {
                appendLoopEvent('Thinking', formatThinkingBlocks(m.blocks || []), 'thinking');
              } else if (m.role === 'todo_reminder') {
                // hidden system reminder
              } else if (m.role === 'compact_boundary') {
                addMessage('compact', m.content || 'Context compacted');
              } else if (m.role === 'system') {
                // skip system prompt
              } else if (m.content) {
                addMessage('assistant', m.content);
              }
            }
          }
          addMessage('compact', 'Loaded: ' + data.title + ' (' + data.message_count + ' messages)');
          updateSendButton();
          listSessions();
          break;
        case 'session_created':
          sessionId = data.id;
          readOnlySession = false;
          viewSessionId = data.id;
          viewParentSessionId = null;
          if (data.naming) {
            namingSessions.add(data.id);
          }
          upsertSessionListItem({ id: data.id, title: data.title || 'New Session', updated_at: Date.now() });
          if (data.created_from_chat && data.naming) {
            autoNameSession(data.id);
          }
          if (!data.created_from_chat) {
            document.getElementById('messages').innerHTML = '';
            currentLoopContainer = null;
            currentStreamEvent = null;
            resetStreamRenderState();
            currentLoopToolEvents.clear();
            renderTodos([]);
            addMessage('compact', 'New session: ' + data.title);
          }
          listSessions();
          break;
        case 'session_naming_started':
          if (data && data.id) {
            namingSessions.add(data.id);
            upsertSessionListItem({ id: data.id, title: data.title || 'New Session', updated_at: Date.now() });
            autoNameSession(data.id);
          }
          break;
        case 'session_forked':
          sessionId = data.id;
          ws.send(JSON.stringify({ action: 'load_session', session_id: data.id }));
          listSessions();
          break;
        case 'session_renamed':
          namingSessions.delete(data.id);
          listSessions();
          break;
        case 'session_deleted':
          namingSessions.delete(data.id);
          subsessionsByParent.delete(data.id);
          expandedSessions.delete(data.id);
          if (data.id === sessionId || data.id === viewSessionId) {
            sessionId = null;
            viewSessionId = null;
            viewParentSessionId = null;
            readOnlySession = false;
            document.getElementById('messages').innerHTML = '';
            renderTodos([]);
            updateSendButton();
          }
          listSessions();
          break;
        case 'compact':
          addMessage('compact', (data.trigger === 'auto' ? 'Auto compacted: ' : 'Context compacted: ') + (data.tokens_before || '?') + ' -> ' + (data.tokens_after || '?') + ' tokens');
          break;
      }
    }

    function addMessage(role, content) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'message ' + role;
      let avatar = 'AI';
      if (role === 'user') avatar = 'M';
      else if (role === 'tool') avatar = 'T';
      else if (role === 'error') avatar = '!';
      else if (role === 'compact') avatar = 'C';
      div.innerHTML = '<div class="avatar">' + avatar + '</div><div class="bubble">' + escapeHtml(content) + '</div>';
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function renderPermissionRequest(data) {
      if (!data || !data.id) return;
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'message tool';
      const inputText = JSON.stringify(data.input || {}, null, 2);
      const segments = Array.isArray(data.segments) && data.segments.length
        ? '<div class="permission-input">' + escapeHtml(data.segments.join('\n')) + '</div>'
        : '';
      div.innerHTML =
        '<div class="avatar">?</div>' +
        '<div class="bubble">' +
        '<div class="permission-card" data-id="' + escapeHtml(data.id) + '" data-tool-name="' + escapeHtml(data.tool_name || '') + '">' +
        '<div class="permission-title">Permission required</div>' +
        '<div class="permission-meta">' + escapeHtml(data.message || ('Tool ' + (data.tool_name || '') + ' wants to run')) + '</div>' +
        (data.reason ? '<div class="permission-meta">' + escapeHtml(data.reason) + '</div>' : '') +
        '<div class="permission-input">' + escapeHtml(inputText) + '</div>' +
        segments +
        '<div class="permission-actions">' +
        '<button onclick="respondPermission(\'' + escapeHtml(data.id) + '\', \'allow\', \'once\')">Allow once</button>' +
        '<button onclick="respondPermission(\'' + escapeHtml(data.id) + '\', \'always\', \'session\')">Allow session</button>' +
        '<button onclick="respondPermission(\'' + escapeHtml(data.id) + '\', \'always\', \'character\')">Allow character</button>' +
        '<button onclick="respondPermission(\'' + escapeHtml(data.id) + '\', \'deny\', \'once\')">Deny once</button>' +
        '<button onclick="respondPermission(\'' + escapeHtml(data.id) + '\', \'never\', \'session\')">Deny session</button>' +
        '<button onclick="respondPermission(\'' + escapeHtml(data.id) + '\', \'never\', \'character\')">Deny character</button>' +
        '</div>' +
        '</div>' +
        '</div>';
      container.appendChild(div);
      pendingPermissionCards.set(data.id, div.querySelector('.permission-card'));
      pendingPermissionRules.set(data.id, Array.isArray(data.suggested_rules) ? data.suggested_rules : []);
      container.scrollTop = container.scrollHeight;
      setStatus('processing', 'Waiting for permission...');
    }

    function respondPermission(id, decision, scope) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const card = pendingPermissionCards.get(id);
      const toolName = card ? (card.dataset.toolName || '') : '';
      const rules = pendingPermissionRules.get(id) || [];
      if (card) {
        card.classList.add('resolved');
        const meta = card.querySelector('.permission-meta');
        if (meta) meta.textContent = meta.textContent + ' [' + decision + ']';
        pendingPermissionCards.delete(id);
        pendingPermissionRules.delete(id);
      }
      ws.send(JSON.stringify({ action: 'permission_response', request_id: id, decision: decision, scope: scope || 'once', tool_name: toolName, rules: rules }));
      setStatus('processing', 'Processing...');
    }

    function renderTodos(todos) {
      currentTodos = Array.isArray(todos) ? todos : [];
      const panel = document.getElementById('todo-panel');
      const list = document.getElementById('todo-list');
      const count = document.getElementById('todo-count');
      if (!currentTodos.length) {
        panel.classList.remove('visible');
        list.innerHTML = '';
        count.textContent = '';
        return;
      }
      panel.classList.add('visible');
      const completed = currentTodos.filter((todo) => todo.status === 'completed').length;
      count.textContent = completed + '/' + currentTodos.length + ' done';
      list.innerHTML = currentTodos.map((todo) => {
        const status = todo.status || 'pending';
        let icon = '&#9633;';
        if (status === 'completed') icon = '&#10003;';
        if (status === 'in_progress') icon = '&#9656;';
        const text = todo.activeForm && status === 'in_progress' ? todo.activeForm : (todo.content || '');
        return '<div class="todo-item ' + escapeHtml(status) + '">' +
          '<span class="todo-icon">' + icon + '</span>' +
          '<span class="todo-text">' + escapeHtml(text) + '</span>' +
          '</div>';
      }).join('');
    }

    function renderMcpServers(servers) {
      if (!Array.isArray(servers) || !servers.length) return;
      const lines = servers.map((server) => {
        const name = server.name || 'unknown';
        const status = server.status || 'unknown';
        const protocol = server.protocol ? ' [' + server.protocol + ']' : '';
        const tools = typeof server.tool_count === 'number' ? ', tools: ' + server.tool_count : '';
        const error = server.error ? ', error: ' + server.error : '';
        return name + ': ' + status + protocol + tools + error;
      });
      addMessage('compact', 'MCP servers:\n' + lines.join('\n'));
    }

    function ensureLoopContainer() {
      if (currentLoopContainer) return currentLoopContainer;
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'message loop';
      div.innerHTML =
        '<div class="avatar">L</div>' +
        '<div class="bubble">' +
        '<div class="loop-container">' +
        '<div class="loop-container-header" onclick="toggleLoopContainer(this)">' +
        '<span class="loop-container-title">Agent Loop</span>' +
        '<span class="loop-container-count">0 items</span>' +
        '</div>' +
        '<div class="loop-container-body"></div>' +
        '</div>' +
        '</div>';
      container.appendChild(div);
      currentLoopContainer = {
        root: div.querySelector('.loop-container'),
        body: div.querySelector('.loop-container-body'),
        count: div.querySelector('.loop-container-count'),
        items: 0,
      };
      return currentLoopContainer;
    }

    function appendLoopEvent(label, content, kind) {
      const group = ensureLoopContainer();
      group.items += 1;
      group.count.textContent = group.items + (group.items === 1 ? ' item' : ' items');
      const item = document.createElement('div');
      item.className = 'loop-event ' + (kind || '');
      const eventLabel = document.createElement('div');
      eventLabel.className = 'loop-event-label';
      eventLabel.textContent = label;
      const eventBody = document.createElement('div');
      eventBody.className = 'loop-event-body';
      eventBody.textContent = content;
      item.appendChild(eventLabel);
      item.appendChild(eventBody);
      group.body.appendChild(item);
      group.body.scrollTop = group.body.scrollHeight;
      const messages = document.getElementById('messages');
      messages.scrollTop = messages.scrollHeight;
      return item;
    }

    function appendToolCallEvent(toolUseId, toolName, input) {
      const item = appendLoopEvent('Tool: ' + (toolName || ''), JSON.stringify(input || {}, null, 2), 'tool');
      if (toolUseId) {
        currentLoopToolEvents.set(toolUseId, item);
      }
      item.querySelector('.loop-event-label').addEventListener('click', () => {
        if (item.querySelector('.loop-event-result')) {
          item.classList.toggle('result-visible');
        }
      });
      return item;
    }

    function attachToolResult(toolUseId, content) {
      const item = toolUseId ? currentLoopToolEvents.get(toolUseId) : null;
      if (!item) return;
      let result = item.querySelector('.loop-event-result');
      if (!result) {
        item.classList.add('has-result');
        result = document.createElement('div');
        result.className = 'loop-event-result';
        item.appendChild(result);
      }
      result.textContent = content;
    }

    function appendStreamingLoopEvent(label, kind) {
      const group = ensureLoopContainer();
      group.items += 1;
      group.count.textContent = group.items + (group.items === 1 ? ' item' : ' items');
      const item = document.createElement('div');
      item.className = 'loop-event ' + (kind || '');
      const eventLabel = document.createElement('div');
      eventLabel.className = 'loop-event-label';
      eventLabel.textContent = label;
      const eventBody = document.createElement('div');
      eventBody.className = 'loop-event-body';
      item.appendChild(eventLabel);
      item.appendChild(eventBody);
      group.body.appendChild(item);
      return { group, item, body: eventBody, content: '', kind };
    }

    function handleDelta(data) {
      if (!data || (data.type !== 'text' && data.type !== 'thinking')) return;
      const kind = data.type === 'thinking' ? 'thinking' : 'assistant';
      const label = data.type === 'thinking' ? 'Thinking' : 'Assistant';
      if (data.type === 'thinking') {
        streamedThinkingThisStep = true;
      } else {
        streamedTextThisStep = true;
      }
      if (!currentStreamEvent || currentStreamEvent.kind !== kind) {
        currentStreamEvent = appendStreamingLoopEvent(label, kind);
      }
      currentStreamEvent.content += data.type === 'thinking' ? (data.thinking || '') : (data.text || '');
      currentStreamEvent.body.textContent = currentStreamEvent.content;
      currentStreamEvent.group.body.scrollTop = currentStreamEvent.group.body.scrollHeight;
      const messages = document.getElementById('messages');
      messages.scrollTop = messages.scrollHeight;
    }

    function removeCurrentAssistantStreamEvent() {
      if (!currentStreamEvent || currentStreamEvent.kind !== 'assistant' || !currentStreamEvent.item) return;
      currentStreamEvent.item.remove();
      if (currentStreamEvent.group) {
        currentStreamEvent.group.items = Math.max(0, currentStreamEvent.group.items - 1);
        currentStreamEvent.group.count.textContent = currentStreamEvent.group.items + (currentStreamEvent.group.items === 1 ? ' item' : ' items');
      }
      currentStreamEvent = null;
    }

    function resetStreamRenderState() {
      streamedThinkingThisStep = false;
      streamedTextThisStep = false;
    }

    function collapseLoopContainer() {
      if (currentLoopContainer) {
        currentLoopContainer.root.classList.add('collapsed');
        currentLoopContainer = null;
      }
    }

    function toggleLoopContainer(header) {
      header.parentElement.classList.toggle('collapsed');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatThinkingBlocks(blocks) {
      if (!blocks || !blocks.length) return '[thinking]';
      return blocks.map((block) => {
        if (block.type === 'redacted_thinking') return '[redacted thinking]';
        if (block.thinking) return block.thinking;
        const copy = Object.assign({}, block);
        delete copy.signature;
        return '[' + (copy.type || 'thinking') + '] ' + JSON.stringify(copy);
      }).join('\n\n');
    }

    function formatError(data) {
      if (data && typeof data === 'object') {
        const type = data.type || 'Error';
        const message = data.message || 'Unknown error';
        return type + ': ' + message;
      }
      return 'Error: ' + (data || 'Unknown error');
    }

    function onSendButtonClick() {
      if (readOnlySession) return;
      if (processing) {
        stopAgent();
      } else {
        sendMessage();
      }
    }

    function sendMessage() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (readOnlySession) return;
      if (!text || processing) return;
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        setStatus('disconnected', 'Not connected');
        updateSendButton();
        return;
      }
      collapseLoopContainer();
      resetStreamRenderState();
      currentLoopToolEvents.clear();
      addMessage('user', text);
      input.value = '';
      processing = true;
      updateSendButton();
      setStatus('processing', 'Processing...');
      ws.send(JSON.stringify({ action: 'chat', message: text, session_id: sessionId }));
    }

    function stopAgent() {
      if (!ws || ws.readyState !== WebSocket.OPEN || !processing) return;
      setStatus('processing', 'Stopping...');
      ws.send(JSON.stringify({ action: 'stop' }));
    }

    function onKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (processing) return;
        sendMessage();
      }
    }

    function updateSendButton() {
      const btn = document.getElementById('send-btn');
      const input = document.getElementById('user-input');
      const unavailable = !ws || ws.readyState !== WebSocket.OPEN || readOnlySession;
      btn.disabled = unavailable;
      input.disabled = readOnlySession;
      input.placeholder = readOnlySession ? 'SubSession view is read-only' : 'Type a message...';
      btn.textContent = processing ? 'Stop' : 'Send';
    }

    function compactSession() {
      if (!ws || !sessionId) return;
      ws.send(JSON.stringify({ action: 'compact', session_id: sessionId }));
    }

    function newSession() {
      readOnlySession = false;
      viewSessionId = null;
      viewParentSessionId = null;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ action: 'new_session' }));
      }
    }

    function listSessions() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ action: 'list_sessions' }));
    }

    function selectSession(id) {
      if (editingId) return;
      sessionId = id;
      readOnlySession = false;
      viewSessionId = id;
      viewParentSessionId = null;
      document.getElementById('messages').innerHTML = '';
      ws.send(JSON.stringify({ action: 'load_session', session_id: id }));
      listSessions();
    }

    function selectSubSession(parentId, childId) {
      if (editingId) return;
      readOnlySession = true;
      viewSessionId = childId;
      viewParentSessionId = parentId;
      document.getElementById('messages').innerHTML = '';
      updateSendButton();
      ws.send(JSON.stringify({ action: 'load_subsession', parent_session_id: parentId, session_id: childId }));
    }

    function toggleSubSessions(id, e) {
      e.stopPropagation();
      if (expandedSessions.has(id)) {
        expandedSessions.delete(id);
        renderSessions(lastSessions);
        return;
      }
      expandedSessions.add(id);
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ action: 'list_subsessions', parent_session_id: id }));
      }
      renderSessions(lastSessions);
    }

    function startRename(id, e) {
      e.stopPropagation();
      editingId = id;
      const item = document.querySelector('.session-item[data-id="' + id + '"]');
      if (!item) return;
      const titleEl = item.querySelector('.title');
      const oldTitle = titleEl.textContent;
      const input = document.createElement('input');
      input.className = 'rename-input';
      input.value = oldTitle;
      input.onblur = function () { finishRename(id, input.value, oldTitle); };
      input.onkeydown = function (ev) {
        if (ev.key === 'Enter') { finishRename(id, input.value, oldTitle); }
        if (ev.key === 'Escape') { finishRename(id, oldTitle, oldTitle); }
      };
      titleEl.innerHTML = '';
      titleEl.appendChild(input);
      input.focus();
      input.select();
    }

    function finishRename(id, newTitle, oldTitle) {
      editingId = null;
      if (newTitle.trim() && newTitle.trim() !== oldTitle) {
        ws.send(JSON.stringify({ action: 'rename_session', session_id: id, title: newTitle.trim() }));
      } else {
        listSessions();
      }
    }

    function autoNameSession(id) {
      const targetId = id || sessionId;
      if (targetId) {
        namingSessions.add(targetId);
        renderSessions(lastSessions);
        ws.send(JSON.stringify({ action: 'auto_name_session', session_id: targetId }));
      }
    }

    function deleteSession(id, e) {
      e.stopPropagation();
      if (!confirm('Delete this session?')) return;
      ws.send(JSON.stringify({ action: 'delete_session', session_id: id }));
    }

    function forkSession(id, e) {
      e.stopPropagation();
      ws.send(JSON.stringify({ action: 'fork_session', session_id: id }));
    }

    function upsertSessionListItem(session) {
      if (!session || !session.id) return;
      const index = lastSessions.findIndex((item) => item.id === session.id);
      if (index >= 0) {
        lastSessions[index] = Object.assign({}, lastSessions[index], session);
      } else {
        lastSessions.unshift(session);
      }
      renderSessions(lastSessions);
    }

    function renderSessions(sessions) {
      lastSessions = Array.isArray(sessions) ? sessions : [];
      const container = document.getElementById('session-list');
      container.innerHTML = lastSessions.map(function (s) {
        const spinner = namingSessions.has(s.id) ? '<span class="naming-spinner"></span>' : '';
        const expanded = expandedSessions.has(s.id);
        const children = subsessionsByParent.get(s.id) || [];
        const parentActive = !readOnlySession && s.id === sessionId;
        let html = '<div class="session-item' + (parentActive ? ' active' : '') + '" data-id="' + s.id + '" onclick="selectSession(\'' + s.id + '\')">' +
          '<span class="session-toggle' + (expanded ? ' expanded' : '') + '" onclick="toggleSubSessions(\'' + s.id + '\', event)"><svg class="chevron" viewBox="0 0 16 16" aria-hidden="true"><polyline points="5,3 11,8 5,13"></polyline></svg></span>' +
          '<span class="title">' + escapeHtml(s.title || 'Untitled') + '</span>' +
          spinner +
          '<span class="actions">' +
          '<button title="Rename" onclick="startRename(\'' + s.id + '\', event)">&#9998;</button>' +
          '<button title="Auto-name" onclick="event.stopPropagation();autoNameSession(\'' + s.id + '\')">AI</button>' +
          '<button title="Fork" onclick="forkSession(\'' + s.id + '\', event)">F</button>' +
          '<button title="Delete" onclick="deleteSession(\'' + s.id + '\', event)">&#10005;</button>' +
          '</span></div>';
        if (expanded) {
          html += children.map(function (child) {
            const childActive = readOnlySession && viewSessionId === child.id && viewParentSessionId === s.id;
            const label = child.name || child.id;
            const detail = child.description ? ' - ' + child.description : '';
            return '<div class="session-item child' + (childActive ? ' active' : '') + '" data-id="' + child.id + '" onclick="selectSubSession(\'' + s.id + '\', \'' + child.id + '\')">' +
              '<span class="session-toggle"></span>' +
              '<span class="title">' + escapeHtml(label + detail) + '</span>' +
              '</div>';
          }).join('');
        }
        return html;
      }).join('');
    }

    connect();
  </script>
</body>

</html>
